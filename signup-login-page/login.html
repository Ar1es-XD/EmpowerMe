<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — EmpowerMe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <!-- ── NAV PILL ── -->
  <!-- <div class="nav-pill" role="navigation" aria-label="Page navigation">
    <button class="menu-pill" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="topMenuPanel">
      <span class="hamburger">☰</span>
      Menu
    </button>
    <button class="theme-pill" type="button" aria-label="Toggle theme">☀</button>
    <div class="percent-pill">0%</div> -->
    <div class="menu-panel" id="topMenuPanel" aria-hidden="true">
      <button class="menu-item" type="button" data-href="../EmpowerMe/Landingpage.html#home">Home</button>
      <button class="menu-item" type="button" data-href="../EmpowerMe/Landingpage.html#how">How It Works</button>
      <button class="menu-item" type="button" data-href="../EmpowerMe/Landingpage.html#features">Features</button>
      <button class="menu-item" type="button" data-href="signup.html">Create Account</button>
    </div>
  </div>

  <!-- <a href="signup.html" class="nav-cta-pill" aria-label="Get Started">Get Started</a> -->

  <!-- ── AUTH CARD ── -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <a href="../landing page/Landingpage.html" class="auth-logo">Empower<span>Me</span></a>

      <!-- Header -->
      <p class="auth-eyebrow">⚖️ Secure Access</p>
      <h1 class="auth-heading">Welcome<br><em>back.</em></h1>
      <p class="auth-sub">Log in to continue understanding your rights.</p>

      <!-- Toast message -->
      <div class="auth-toast" id="authToast" role="alert" aria-live="polite"></div>

      <!-- Google -->
      <a href="#" class="btn-social" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Form -->
      <form class="auth-form" id="loginForm" novalidate>

        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <input
            class="field-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="password-wrap">
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
              <!-- Eye icon -->
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit">
          Log In
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

      </form>

      <!-- Switch -->
      <div class="auth-switch">
        Don't have an account?
        <a href="signup.html">Create one free →</a>
      </div>

    </div>
  </div>

  <script>
    (() => {
      const body       = document.body;
      const navPill    = document.querySelector('.nav-pill');
      const menuBtn    = document.querySelector('.menu-pill');
      const themeBtn   = document.querySelector('.theme-pill');
      const menuPanel  = document.querySelector('.menu-panel');
      const percent    = document.querySelector('.percent-pill');
      const menuItems  = document.querySelectorAll('.menu-item');
      const form       = document.getElementById('loginForm');
      const toast      = document.getElementById('authToast');
      const togglePwd  = document.getElementById('togglePassword');
      const passwordEl = document.getElementById('password');
      const eyeIcon    = document.getElementById('eyeIcon');

      // ── Theme ──
      function setTheme(mode) {
        body.classList.toggle('dark', mode === 'dark');
        themeBtn.textContent = mode === 'dark' ? '☾' : '☀';
        localStorage.setItem('empowerme-theme', mode);
      }
      const saved = localStorage.getItem('empowerme-theme')
        || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      setTheme(saved);
      themeBtn.addEventListener('click', () =>
        setTheme(body.classList.contains('dark') ? 'light' : 'dark'));

      // ── Scroll percent ──
      let last = -1;
      window.addEventListener('scroll', () => {
        const h = document.documentElement.scrollHeight - window.innerHeight;
        const p = h > 0 ? Math.round((window.scrollY / h) * 100) : 0;
        if (p !== last) { percent.textContent = `${p}%`; last = p; }
        navPill.classList.toggle('scrolled', window.scrollY > 30);
      });

      // ── Menu ──
      menuBtn.addEventListener('click', e => {
        e.stopPropagation();
        const open = navPill.classList.toggle('menu-open');
        menuBtn.setAttribute('aria-expanded', open);
        menuPanel.setAttribute('aria-hidden', !open);
      });
      document.addEventListener('click', e => {
        if (!navPill.contains(e.target)) navPill.classList.remove('menu-open');
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') navPill.classList.remove('menu-open');
      });
      menuItems.forEach(item => {
        item.addEventListener('click', () => {
          const href = item.dataset.href;
          if (href) window.location.href = href;
          navPill.classList.remove('menu-open');
        });
      });

      // ── Password toggle ──
      const eyeOpen  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      togglePwd.addEventListener('click', () => {
        const isText = passwordEl.type === 'text';
        passwordEl.type = isText ? 'password' : 'text';
        eyeIcon.innerHTML = isText ? eyeOpen : eyeClosed;
        togglePwd.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
      });

      // ── Toast ──
      function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = `auth-toast ${type}`;
        // Force reflow
        void toast.offsetWidth;
        toast.classList.add('visible');
        if (type !== 'success') setTimeout(() => toast.classList.remove('visible'), 4200);
      }

      // ── Form submit (wire up your real auth here) ──
      form.addEventListener('submit', e => {
        e.preventDefault();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !email.includes('@')) {
          showToast('Please enter a valid email address.', 'error'); return;
        }
        if (password.length < 6) {
          showToast('Password must be at least 6 characters.', 'error'); return;
        }

        // Placeholder success — replace with real auth call
        const btn = form.querySelector('.btn-submit');
        btn.textContent = 'Logging in…';
        btn.disabled = true;
        setTimeout(() => {
          showToast('Logged in! Redirecting…', 'success');
          // window.location.href = 'dashboard.html'; // ← redirect after auth
          btn.textContent = 'Log In →';
          btn.disabled = false;
        }, 1400);
      });

      // ── Google (placeholder) ──
      document.getElementById('googleBtn').addEventListener('click', e => {
        e.preventDefault();
        showToast('Google sign-in coming soon.', 'error');
      });
    })();
  </script>

</body>
</html>
